<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="/login.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Mail Sender</h1>

        <p class="subtitle">

            Login with Gmail and App Password

        </p>

        <form action="/login" method="POST">

            <input
            type="text"
            name="name"
            placeholder="Enter Your Name"
            required>

            <input
            type="email"
            name="email"
            placeholder="Enter Gmail"
            required>

            <input
            type="password"
            name="apppassword"
            placeholder="Enter App Password"
            required>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
