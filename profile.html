<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="/profile.css">
</head>

<body>

<div class="container">

    <div class="card">

        <!-- Avatar (emoji style) -->
        <div class="avatar">
        </div>

        <h1>{{name}}</h1>
        <p class="email">{{email}}</p>

        <div class="info-box">
            <p><b>Status:</b> Active User</p>
            <p><b>Role:</b> Mail Sender App User</p>
            <p><b>Security:</b> Gmail Auth Enabled</p>
        </div>

        <a href="/dashboard">
            <button>Back to Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>
